<h2>首页布局方案</h2>
<p class="subtitle">iOS 风格的首页，放什么内容？</p>

<div class="options">
  <div class="option" data-choice="dashboard" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>仪表盘式</h3>
      <p>大标题 + 角色头像/问候 + 游戏状态卡片（觉醒值/好感度/金币）+ 快捷入口（继续聊天/去农场/进战斗）</p>
      <div class="tag">最全面</div>
    </div>
  </div>
  <div class="option" data-choice="widgets" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Widget 式</h3>
      <p>类似 iOS 桌面小组件：角色小窗（展示当前互动角色）、农场状态（可收获？）、最新动态 + 底部的快捷操作条</p>
      <div class="tag">最 iOS 味</div>
    </div>
  </div>
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简欢迎页</h3>
      <p>大标题 + 一句角色台词 + 角色立绘 + "开始游戏"按钮。类似游戏启动屏的感觉</p>
      <div class="tag">最沉浸</div>
    </div>
  </div>
</div>

<div class="section">
  <h3>或你自己描述想要的首页感觉？</h3>
  <p class="subtitle">直接在终端告诉我你的想法</p>
</div>
